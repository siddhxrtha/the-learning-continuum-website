<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Thank you for your enquiry. The Learning Continuum team will contact you shortly."
    />
    <title>Thank You | The Learning Continuum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="stylesheet" href="assets/css/home.css" />
    <link rel="stylesheet" href="assets/css/redesign.css" />
    <style>
      .thankyou-wrap {
        position: relative;
        background:
          radial-gradient(65% 90% at 0% 0%, rgba(16, 63, 122, 0.12), rgba(16, 63, 122, 0)),
          radial-gradient(70% 85% at 100% 100%, rgba(179, 38, 45, 0.1), rgba(179, 38, 45, 0)),
          #f7faff;
      }

      .thankyou-card {
        border: 1px solid rgba(16, 63, 122, 0.13);
        border-radius: 1.2rem;
        background: #ffffff;
        box-shadow: 0 18px 36px rgba(11, 47, 89, 0.1);
        max-width: 760px;
        margin: 0 auto;
      }

      .thankyou-icon {
        width: 4rem;
        height: 4rem;
        border-radius: 50%;
        display: inline-grid;
        place-items: center;
        margin-bottom: 1rem;
        color: #ffffff;
        background: linear-gradient(180deg, #1f5ea8 0%, #11467f 100%);
        box-shadow: 0 12px 22px rgba(11, 47, 89, 0.2);
      }

      .thankyou-card .lead {
        max-width: 55ch;
        margin-left: auto;
        margin-right: auto;
      }
    </style>
  </head>
  <body>
    <div class="scroll-progress" aria-hidden="true"></div>
    <site-navbar></site-navbar>

    <section class="section-space nav-overlap-section thankyou-wrap">
      <div class="container py-lg-3">
        <article class="thankyou-card text-center p-4 p-lg-5">
          <div class="thankyou-icon" aria-hidden="true">
            <i class="bi bi-check2-circle fs-2"></i>
          </div>
          <p class="programmes-kicker mb-2">Form Submitted</p>
          <h1 class="mb-3">Thank You For Your Enquiry</h1>
          <p class="lead text-secondary mb-4">
            We have received your details and our team will contact you shortly with suitable class options and trial timings.
          </p>
          <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
            <a class="btn btn-primary px-4" href="contact.html">Submit Another Enquiry</a>
            <a class="btn btn-outline-primary px-4" href="index.html">Back to Home</a>
          </div>
        </article>
      </div>
    </section>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/home.js"></script>
    <script src="assets/js/site.js"></script>
  </body>
</html>
